model:
  img_size: 256
  patch_size: 16
  in_ch: 3
  latent_dim: 512
  embed_dim: 256
  enc_depth: 12
  dec_depth: 16
  heads: 8

data:
  img_size: 256
  batch_size: 32
  num_workers: 4
  data_root: ./data # set the root to the data folder (images should be stored in the right format: torchvision ImageFolder)
  # /kaggle/input/datasets/gpiosenka/butterfly-images40-species/train

train:
  epochs: 10
  lr: 3.0e-4
  kl_weight: 1.0e-2
  ckpt_path: checkpoints/vae.pt
  log_every: 200
  use_amp: true
