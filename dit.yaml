model:
  grid_size: 16
  latent_dim: 32
  dim: 512
  depth: 16
  heads: 8
  num_classes: 1000
  class_dropout_prob: 0.1

diffusion:
  timesteps: 500
  beta_start: 1.0e-4
  beta_end: 2.0e-2

data:
  img_size: 256
  batch_size: 64
  num_workers: 4
  data_root: ./data # set the root to the data folder (images should be stored in the right format: torchvision ImageFolder)


train:
  epochs: 200
  lr: 1.0e-4
  device: cuda
  use_amp: true
  vae_ckpt_path: checkpoints/vae.pt
  ckpt_path: checkpoints/dit.pt
  log_every: 200

sample:
  ddim_steps: 50
  num_samples: 8
  class_id: 0
  out_path: samples/dit_samples.png
